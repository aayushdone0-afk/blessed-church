<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSavari</title>

<style>
body{
font-family:Arial;
margin:0;
background:#0b1220;
color:white;
}

header{
text-align:center;
padding:20px;
background:#111827;
}

section{
padding:20px;
text-align:center;
}

.box{
background:#111827;
padding:20px;
margin:auto;
max-width:500px;
border-radius:15px;
}

input{
width:90%;
padding:12px;
margin:8px;
border-radius:10px;
border:none;
}

button{
padding:12px 20px;
background:#facc15;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
margin:5px;
}

.card{
background:#1f2937;
margin:10px;
padding:10px;
border-radius:10px;
}
</style>

</head>

<body>

<header>
<h1>🚕 AutoSavari</h1>
<p>Cheap • Fast • Local</p>
</header>

<!-- LOGIN -->
<section>
<div class="box">
<h2>Login / Signup</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<br>

<button onclick="signup()">Sign Up</button>
<button onclick="login()">Login</button>
</div>
</section>

<!-- BOOKING -->
<section>
<div class="box">
<h2>Book Ride</h2>

<input id="pickup" placeholder="Pickup Location">
<input id="drop" placeholder="Drop Location">

<br>

<button onclick="bookRide()">Book Auto</button>
</div>
</section>

<!-- MAP -->
<section>
<h2>📍 Sindhuli Marta Map</h2>

<iframe
width="90%"
height="300"
style="border-radius:15px"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps/embed/v1/place?key=AIzaSyAgX_B7ED7V_F2mn9nuJtqxKgCUFjhm1iM&q=Marta,Sindhuli,Nepal">
</iframe>
</section>

<!-- BOOKINGS -->
<section>
<h2>Bookings</h2>
<div id="list"></div>
</section>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDzFZhn3wnVDyWFlHfBCUE0PoTGq2jug3k",
authDomain: "asia-south1-34519.firebaseapp.com",
projectId: "asia-south1-34519",
storageBucket: "asia-south1-34519.firebasestorage.app",
messagingSenderId: "180733727705",
appId: "1:180733727705:web:d35bea8593225078b33fc8"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// SIGNUP
window.signup = async function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

try{
await createUserWithEmailAndPassword(auth,email,pass);
alert("Signup Success 🚕");
}catch(e){
alert(e.message);
}
}

// LOGIN
window.login = async function(){
let email = document.getElementById("email").value;
let pass = document.getElementById("pass").value;

try{
await signInWithEmailAndPassword(auth,email,pass);
alert("Login Success 🚕");
}catch(e){
alert(e.message);
}
}

// BOOK RIDE
window.bookRide = async function(){

let pickup = document.getElementById("pickup").value;
let drop = document.getElementById("drop").value;

if(pickup=="" || drop==""){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"rides"),{
pickup,
drop,
time: Date.now()
});

alert("Ride Booked 🚕");
loadRides();
}

// LOAD RIDES
async function loadRides(){

let snap = await getDocs(collection(db,"rides"));

let html = "";

snap.forEach(doc=>{
let d = doc.data();

html += `
<div class="card">
🚕 ${d.pickup} → ${d.drop}
</div>
`;
});

document.getElementById("list").innerHTML = html;
}

loadRides();

</script>

</body>
</html>
